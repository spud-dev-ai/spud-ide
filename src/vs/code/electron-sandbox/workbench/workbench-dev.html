		<!-- Spud early-paint theme: mirror of the block in workbench.html.
		     Keep in sync with `media/void.css` `body.spud-enhance-dark`. -->
		<style>
			body.spud-enhance-dark .monaco-workbench,
			html.spud-enhance-dark body .monaco-workbench {
				--vscode-sideBar-background: color-mix(in srgb, var(--vscode-sideBar-background) 92%, black 8%);
				--vscode-sideBarSectionHeader-background: color-mix(in srgb, var(--vscode-sideBarSectionHeader-background) 90%, black 10%);
				--vscode-activityBar-background: color-mix(in srgb, var(--vscode-activityBar-background) 92%, black 8%);
				--vscode-editor-background: color-mix(in srgb, var(--vscode-editor-background) 94%, black 6%);
				--vscode-editorGroupHeader-tabsBackground: color-mix(in srgb, var(--vscode-editorGroupHeader-tabsBackground) 90%, black 10%);
				--vscode-tab-inactiveBackground: color-mix(in srgb, var(--vscode-tab-inactiveBackground) 88%, black 12%);
				--vscode-tab-activeBackground: color-mix(in srgb, var(--vscode-tab-activeBackground) 96%, white 4%);
				--vscode-titleBar-activeBackground: color-mix(in srgb, var(--vscode-titleBar-activeBackground) 92%, black 8%);
				--vscode-statusBar-background: color-mix(in srgb, var(--vscode-statusBar-background) 92%, black 8%);
				--vscode-panel-background: color-mix(in srgb, var(--vscode-panel-background) 92%, black 8%);
				--vscode-input-background: color-mix(in srgb, var(--vscode-input-background) 92%, black 8%);
				--vscode-sideBar-border: color-mix(in srgb, var(--vscode-sideBar-border, transparent) 70%, white 30%);
				--vscode-editorGroup-border: color-mix(in srgb, var(--vscode-editorGroup-border, transparent) 70%, white 30%);
				--vscode-panel-border: color-mix(in srgb, var(--vscode-panel-border, transparent) 70%, white 30%);
				--vscode-tab-border: color-mix(in srgb, var(--vscode-tab-border, transparent) 70%, white 30%);
				--vscode-commandCenter-border: color-mix(in srgb, var(--vscode-commandCenter-border, transparent) 75%, white 25%);
				--vscode-commandCenter-inactiveBorder: color-mix(in srgb, var(--vscode-commandCenter-inactiveBorder, transparent) 70%, white 30%);
			}
		</style>

		<!-- Spud early-paint theme guess (FIRST-EVER LAUNCH ONLY).
		     Subsequent launches have `workbench.ts` override this based on the
		     persisted baseTheme before shell colors paint. See the twin block
		     in workbench.html for the full rationale. -->
		<script>
			(function () {
				try {
					var wantsDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
					document.documentElement.classList.toggle('spud-dark', wantsDark);
					document.documentElement.classList.toggle('spud-enhance-dark', wantsDark);
					document.addEventListener('DOMContentLoaded', function () {
						document.body.classList.toggle('spud-dark', wantsDark);
						document.body.classList.toggle('spud-enhance-dark', wantsDark);
					}, { once: true });
				} catch (e) { /* ignore — workbench.ts will assert the real value */ }
			})();
		</script>

		<!-- Spud startup splash: paints immediately from HTML before any
		     workbench CSS/JS loads; removed by PartsSplash on first layout.
		     Colors follow the OS color-scheme so the splash matches the
		     theme the workbench is about to render in. -->
		<style>
			#spud-splash {
				position: fixed;
				inset: 0;
				z-index: 2147483000;
				display: flex;
				align-items: center;
				justify-content: center;
				background: #1f1f1f;
				color: #e6e6e6;
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
				transition: opacity 360ms ease;
				opacity: 1;
				pointer-events: none;
				-webkit-user-select: none;
				user-select: none;
			}
			#spud-splash.spud-splash--hide { opacity: 0; }
			#spud-splash .spud-splash-inner {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 14px;
				transform: translateY(-4%);
			}
			#spud-splash .spud-splash-logo {
				width: 72px;
				height: 72px;
				border-radius: 16px;
				object-fit: contain;
				filter: drop-shadow(0 10px 28px rgba(0, 0, 0, 0.5));
				animation: spud-splash-breathe 2.6s ease-in-out infinite;
			}
			#spud-splash .spud-splash-wordmark {
				font-size: 13px;
				font-weight: 600;
				letter-spacing: 0.16em;
				text-transform: uppercase;
				color: #f2f2f2;
			}
			#spud-splash .spud-splash-sub {
				font-size: 11px;
				color: #a0a0a0;
				display: flex;
				align-items: center;
				gap: 8px;
			}
			#spud-splash .spud-splash-spinner {
				width: 14px;
				height: 14px;
				border-radius: 999px;
				border: 2px solid rgba(255, 255, 255, 0.12);
				border-top-color: rgba(255, 255, 255, 0.55);
				animation: spud-splash-spin 0.9s linear infinite;
			}
			@keyframes spud-splash-spin {
				from { transform: rotate(0deg); }
				to   { transform: rotate(360deg); }
			}
			@keyframes spud-splash-breathe {
				0%, 100% { transform: scale(1); }
				50%      { transform: scale(1.04); }
			}
			@media (prefers-color-scheme: light) {
				#spud-splash {
					background: #ffffff;
					color: #1f1f1f;
				}
				#spud-splash .spud-splash-logo {
					filter: drop-shadow(0 10px 28px rgba(0, 0, 0, 0.12));
				}
				#spud-splash .spud-splash-wordmark { color: #1f1f1f; }
				#spud-splash .spud-splash-sub { color: #616161; }
				#spud-splash .spud-splash-spinner {
					border: 2px solid rgba(0, 0, 0, 0.08);
					border-top-color: rgba(0, 0, 0, 0.5);
				}
			}
		</style>
	</head>
